<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>EliteChat</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f0f0f;
      color:white;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:420px;
      background:#1a1a1a;
      border-radius:25px;
      padding:30px;
      box-shadow:0 0 30px rgba(255,152,0,0.15);
      text-align:center;
    }

    h1{
      font-size:42px;
      color:#ff9800;
      margin-bottom:10px;
    }

    p{
      color:#999;
      margin-bottom:30px;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:15px;
      background:#ff9800;
      color:black;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      margin-top:15px;
    }

    button:hover{
      opacity:0.9;
      transform:scale(1.02);
    }

    input{
      width:100%;
      padding:16px;
      border:none;
      border-radius:15px;
      background:#2a2a2a;
      color:white;
      font-size:16px;
      text-align:center;
      margin-top:20px;
      outline:none;
      text-transform:uppercase;
    }

    .roomCode{
      margin-top:25px;
      background:#2a2a2a;
      padding:18px;
      border-radius:15px;
      color:#00ff88;
      font-size:28px;
      font-weight:bold;
      letter-spacing:4px;
      display:none;
    }

    .divider{
      margin:25px 0;
      color:#555;
      font-size:14px;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>EliteChat</h1>

    <p>
      Private Temporary Secret Chat
    </p>

    <button onclick="createRoom()">
      Create Secret Chat
    </button>

    <div class="roomCode" id="roomCode"></div>

    <div class="divider">
      OR
    </div>

    <input
      type="text"
      id="joinCode"
      placeholder="ENTER SECRET CODE"
      maxlength="6"
    />

    <button onclick="joinRoom()">
      Join Chat
    </button>

  </div>

  <!-- Firebase -->

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getDatabase,
      ref,
      set,
      get
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // YOUR FIREBASE CONFIG

    const firebaseConfig = {

      apiKey: "AIzaSyDrp-ppWgECF4A8fFiekfCjzV0kpRwvNNg",

      authDomain: "elitechat-cd6b8.firebaseapp.com",

      databaseURL:
      "https://elitechat-cd6b8-default-rtdb.asia-southeast1.firebasedatabase.app",

      projectId: "elitechat-cd6b8",

      storageBucket:
      "elitechat-cd6b8.firebasestorage.app",

      messagingSenderId: "303278626333",

      appId:
      "1:303278626333:web:2468067f17b3ad297c18f4"

    };

    // Initialize Firebase

    const app = initializeApp(firebaseConfig);

    const db = getDatabase(app);

    // Generate Room Code

    function generateCode(length = 6){

      const chars =
      "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

      let result = "";

      for(let i = 0; i < length; i++){

        result += chars.charAt(
          Math.floor(Math.random() * chars.length)
        );

      }

      return result;

    }

    // Create Room

    window.createRoom = async function(){

      const roomCode = generateCode();

      // Create room in Firebase

      await set(
        ref(db, "rooms/" + roomCode),
        {
          createdAt: Date.now()
        }
      );

      // Show Code

      const codeBox =
      document.getElementById("roomCode");

      codeBox.style.display = "block";

      codeBox.innerText = roomCode;

      // Redirect

      setTimeout(() => {

        window.location.href =
        `chat.html?room=${roomCode}`;

      }, 1500);

    }

    // Join Room

    window.joinRoom = async function(){

      const roomCode =
      document.getElementById("joinCode")
      .value
      .trim()
      .toUpperCase();

      if(roomCode === ""){

        alert("Enter Secret Code");

        return;

      }

      // Check if room exists

      const snapshot = await get(
        ref(db, "rooms/" + roomCode)
      );

      if(snapshot.exists()){

        window.location.href =
        `chat.html?room=${roomCode}`;

      } else {

        alert("Room Not Found");

      }

    }

  </script>

</body>
</html>
