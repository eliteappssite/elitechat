<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0"/>

  <title>EliteChat</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f0f0f;
      color:white;
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    .topBar{
      background:#1a1a1a;
      padding:15px;
      border-bottom:1px solid #333;

      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .roomInfo{
      display:flex;
      flex-direction:column;
    }

    .title{
      font-size:20px;
      font-weight:bold;
      color:#ff9800;
    }

    .roomCode{
      color:#00ff88;
      margin-top:4px;
      font-size:14px;
      letter-spacing:2px;
    }

    .typing{
      color:#999;
      font-size:12px;
      margin-top:4px;
    }

    .leaveBtn{
      background:#ff4444;
      border:none;
      padding:10px 15px;
      border-radius:10px;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    .chatBox{
      flex:1;
      overflow-y:auto;
      padding:15px;

      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .message{
      background:#1f1f1f;
      padding:12px;
      border-radius:15px;
      max-width:80%;
      word-wrap:break-word;
      align-self:flex-start;

      animation:fadeIn 0.2s ease;
    }

    .message:hover{
      background:#2a2a2a;
    }

    .replyBox{
      background:#2e2e2e;
      color:#00ff88;
      padding:6px;
      border-radius:8px;
      font-size:12px;
      margin-bottom:6px;
    }

    .messageText{
      font-size:15px;
    }

    .messageTime{
      font-size:10px;
      color:#999;
      margin-top:6px;
      text-align:right;
    }

    .replyPreview{
      background:#222;
      padding:10px;
      color:#00ff88;
      display:none;
      font-size:13px;
    }

    .inputArea{
      display:flex;
      gap:10px;
      padding:10px;
      background:#1a1a1a;
      border-top:1px solid #333;
    }

    input{
      flex:1;
      padding:15px;
      border:none;
      border-radius:15px;
      background:#2a2a2a;
      color:white;
      outline:none;
      font-size:15px;
    }

    .sendBtn{
      background:#ff9800;
      color:black;
      border:none;
      padding:15px 20px;
      border-radius:15px;
      cursor:pointer;
      font-weight:bold;
    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(10px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

  </style>
</head>

<body>

  <!-- Top -->

  <div class="topBar">

    <div class="roomInfo">

      <div class="title">
        EliteChat
      </div>

      <div class="roomCode"
      id="roomCode"></div>

      <div class="typing"
      id="typing"></div>

    </div>

    <button class="leaveBtn"
    onclick="leaveChat()">

      Leave

    </button>

  </div>

  <!-- Chat -->

  <div class="chatBox"
  id="chatBox"></div>

  <!-- Reply Preview -->

  <div class="replyPreview"
  id="replyPreview"></div>

  <!-- Input -->

  <div class="inputArea">

    <input
      type="text"
      id="messageInput"
      placeholder="Type message..."
      oninput="typingStatus()"
    />

    <button class="sendBtn"
    onclick="sendMessage()">

      Send

    </button>

  </div>

  <!-- Firebase -->

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {

      getDatabase,
      ref,
      push,
      set,
      onValue,
      remove,
      get

    }

    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // Firebase Config

    const firebaseConfig = {

      apiKey: "AIzaSyDrp-ppWgECF4A8fFiekfCjzV0kpRwvNNg",

      authDomain: "elitechat-cd6b8.firebaseapp.com",

      databaseURL:
      "https://elitechat-cd6b8-default-rtdb.asia-southeast1.firebasedatabase.app",

      projectId: "elitechat-cd6b8",

      storageBucket:
      "elitechat-cd6b8.firebasestorage.app",

      messagingSenderId: "303278626333",

      appId:
      "1:303278626333:web:2468067f17b3ad297c18f4"

    };

    // Initialize Firebase

    const app =
    initializeApp(firebaseConfig);

    const db =
    getDatabase(app);

    // Room

    const params =
    new URLSearchParams(window.location.search);

    const room =
    params.get("room");

    document.getElementById("roomCode")
    .innerText =
    room;

    const roomRef =
    ref(db, "rooms/" + room);

    const messagesRef =
    ref(db,
    "rooms/" + room + "/messages");

    const typingRef =
    ref(db,
    "rooms/" + room + "/typing");

    // Check Room Exists

    const roomCheck =
    await get(roomRef);

    if(!roomCheck.exists()){

      alert("Room Expired");

      window.location.href =
      "index.html";

    }

    // Reply System

    let replyText = "";

    // Time

    function getTime(){

      const now =
      new Date();

      return now.toLocaleTimeString([], {

        hour:'2-digit',
        minute:'2-digit'

      });

    }

    // Send Message

    window.sendMessage =
    async function(){

      const input =
      document.getElementById("messageInput");

      const text =
      input.value.trim();

      if(text === "") return;

      const msgRef =
      push(messagesRef);

      await set(msgRef, {

        text:text,

        time:getTime(),

        reply:replyText

      });

      input.value = "";

      replyText = "";

      document.getElementById(
      "replyPreview").style.display =
      "none";

      set(typingRef, false);

    }

    // Realtime Messages

    onValue(messagesRef,
    (snapshot)=>{

      const chatBox =
      document.getElementById("chatBox");

      chatBox.innerHTML = "";

      snapshot.forEach((child)=>{

        const data =
        child.val();

        const div =
        document.createElement("div");

        div.className =
        "message";

        let replyHTML = "";

        if(data.reply){

          replyHTML =
          `<div class="replyBox">
            Reply: ${data.reply}
          </div>`;

        }

        div.innerHTML = `

          ${replyHTML}

          <div class="messageText">
            ${data.text}
          </div>

          <div class="messageTime">
            ${data.time}
          </div>

        `;

        // Reply Click

        div.onclick = ()=>{

          replyText =
          data.text;

          const preview =
          document.getElementById(
          "replyPreview");

          preview.style.display =
          "block";

          preview.innerText =
          "Replying to: " +
          data.text;

        }

        chatBox.appendChild(div);

      });

      chatBox.scrollTop =
      chatBox.scrollHeight;

    });

    // Typing

    let typingTimeout;

    window.typingStatus =
    function(){

      set(typingRef, true);

      clearTimeout(
      typingTimeout);

      typingTimeout =
      setTimeout(()=>{

        set(typingRef, false);

      },1000);

    }

    // Listen Typing

    onValue(typingRef,
    (snapshot)=>{

      const typing =
      snapshot.val();

      document.getElementById(
      "typing")

      .innerText =

      typing
      ? "typing..."
      : "";

    });

    // Leave Chat

    window.leaveChat =
    async function(){

      await remove(roomRef);

      window.location.href =
      "index.html";

    }

    // Auto Delete

    window.onbeforeunload =
    async function(){

      await remove(roomRef);

    }

  </script>

</body>
</html>
