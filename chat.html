<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>EliteChat</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f0f0f;
      color:white;
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    .topBar{
      background:#1a1a1a;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid #333;
    }

    .roomCode{
      color:#00ff88;
      font-weight:bold;
      letter-spacing:2px;
    }

    .typing{
      font-size:12px;
      color:#aaa;
      margin-top:5px;
    }

    .chatBox{
      flex:1;
      overflow-y:auto;
      padding:15px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .message{
      background:#1f1f1f;
      padding:10px;
      border-radius:12px;
      max-width:75%;
      position:relative;
      word-wrap:break-word;
    }

    .time{
      font-size:10px;
      color:#aaa;
      margin-top:5px;
      text-align:right;
    }

    .reply{
      font-size:12px;
      color:#00ff88;
      margin-bottom:5px;
    }

    .inputArea{
      display:flex;
      padding:10px;
      background:#1a1a1a;
      gap:10px;
    }

    input{
      flex:1;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#2a2a2a;
      color:white;
      font-size:15px;
    }

    button{
      padding:15px 20px;
      border:none;
      border-radius:12px;
      background:#ff9800;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

  </style>
</head>

<body>

  <div class="topBar">

    <div>
      <div>EliteChat</div>

      <div class="roomCode" id="roomCode"></div>

      <div class="typing" id="typing"></div>
    </div>

    <button onclick="leaveChat()">
      Leave
    </button>

  </div>

  <div class="chatBox" id="chatBox"></div>

  <div class="inputArea">

    <input
      type="text"
      id="messageInput"
      placeholder="Type message..."
      oninput="typingStatus()"
    />

    <button onclick="sendMessage()">
      Send
    </button>

  </div>

  <script type="module">

    import {
      database,
      ref,
      push,
      set,
      onValue,
      remove
    } from "./firebase.js";

    const params =
      new URLSearchParams(window.location.search);

    const room =
      params.get("room");

    document.getElementById("roomCode")
      .innerText = room;

    const roomRef =
      ref(database, "rooms/" + room);

    const messagesRef =
      ref(database, "rooms/" + room + "/messages");

    const typingRef =
      ref(database, "rooms/" + room + "/typing");

    let replyText = "";

    function getTime() {

      const now = new Date();

      return now.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
      });

    }

    window.sendMessage = function() {

      const input =
        document.getElementById("messageInput");

      const text = input.value.trim();

      if(text === "") return;

      const msgRef = push(messagesRef);

      set(msgRef, {
        text: text,
        time: getTime(),
        reply: replyText
      });

      input.value = "";

      replyText = "";

      set(typingRef, false);

    }

    onValue(messagesRef, (snapshot) => {

      const chatBox =
        document.getElementById("chatBox");

      chatBox.innerHTML = "";

      snapshot.forEach((child) => {

        const data = child.val();

        const div =
          document.createElement("div");

        div.className = "message";

        let replyHTML = "";

        if(data.reply) {

          replyHTML =
            `<div class="reply">
              Reply: ${data.reply}
            </div>`;

        }

        div.innerHTML = `
          ${replyHTML}
          <div>${data.text}</div>
          <div class="time">${data.time}</div>
        `;

        div.onclick = () => {

          replyText = data.text;

        };

        chatBox.appendChild(div);

      });

      chatBox.scrollTop =
        chatBox.scrollHeight;

    });

    window.typingStatus = function() {

      set(typingRef, true);

      setTimeout(() => {

        set(typingRef, false);

      }, 1000);

    }

    onValue(typingRef, (snapshot) => {

      const typing =
        snapshot.val();

      document.getElementById("typing")
        .innerText =
        typing ? "typing..." : "";

    });

    window.leaveChat = function() {

      remove(roomRef);

      window.location.href = "index.html";

    }

    window.onbeforeunload = function() {

      remove(roomRef);

    }

  </script>

</body>
</html>
